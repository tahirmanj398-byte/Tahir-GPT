    <script>
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        if (typeof reason === 'string' && reason.includes('WebSocket closed')) {
          event.preventDefault();
          event.stopImmediatePropagation();

          event.preventDefault();
